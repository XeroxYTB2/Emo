<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
:root{--bg:#0a0a0a;--text:#c8e6ff;--accent:#00e5ff;--blue:#7eb8f7;--btn:rgba(126,184,247,0.3)}
body.light{--bg:#ddeeff;--text:#0a2a4a;--accent:#0066cc;--btn:rgba(0,102,204,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .4s,color .4s}
.wrap{display:flex;flex-direction:column;align-items:center;gap:13px;padding:20px;width:100%;max-width:400px}
.title{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:6px;color:var(--accent);text-transform:uppercase}
/* FACE */
.fw{width:190px;height:190px;cursor:pointer;filter:drop-shadow(0 0 22px rgba(126,184,247,.45));transition:filter .3s}
.fw.spk{animation:fg .4s ease-in-out infinite alternate}
@keyframes fg{from{filter:drop-shadow(0 0 22px rgba(126,184,247,.45))}to{filter:drop-shadow(0 0 55px var(--accent))}}
.fb{width:100%;height:100%;background:var(--blue);border-radius:28px;position:relative;overflow:hidden}
.fb::before{content:'';position:absolute;top:-40%;left:-20%;width:50%;height:60%;background:rgba(255,255,255,.12);border-radius:50%;transform:rotate(-30deg)}
.eyes{position:absolute;top:29%;left:0;right:0;display:flex;justify-content:center;gap:36px}
.eye{width:34px;height:34px;background:#111;border-radius:6px;position:relative;overflow:hidden;transition:height .1s}
.eye::after{content:'';position:absolute;inset:5px;background:radial-gradient(circle,#00e5ff 0%,#006080 70%,transparent 100%);border-radius:3px;opacity:0;transition:opacity .3s}
.fb.lst .eye::after{opacity:1;animation:eg 1s ease-in-out infinite alternate}
@keyframes eg{from{opacity:.5}to{opacity:1}}
.fb.hpy .eye{height:22px;border-radius:6px 6px 14px 14px}
.fb.sar .eye:first-child{transform:rotate(-6deg)}
.fb.sar .eye:last-child{transform:rotate(6deg)}
@keyframes blk{0%,100%{height:34px}50%{height:3px;border-radius:2px}}
.eye.blk{animation:blk .15s ease-in-out}
.mth{position:absolute;bottom:23%;left:50%;transform:translateX(-50%);width:64px;height:16px;background:#111;border-radius:4px;overflow:hidden;transition:all .2s}
.fb.hpy .mth{height:9px;border-radius:0 0 32px 32px}
.fb.sar .mth{width:44px;height:9px;border-radius:4px 4px 4px 11px;transform:translateX(calc(-50% + 6px))}
.mi{width:100%;height:100%;display:flex;align-items:flex-end;justify-content:space-around;padding:0 3px 2px;gap:2px}
.b{flex:1;background:var(--accent);border-radius:2px 2px 0 0;height:0}
.fb.spk .b{animation:tlk .12s ease-in-out infinite alternate}
.fb.spk .b:nth-child(1){animation-duration:.13s;animation-delay:0s}
.fb.spk .b:nth-child(2){animation-duration:.10s;animation-delay:.04s}
.fb.spk .b:nth-child(3){animation-duration:.09s;animation-delay:.01s}
.fb.spk .b:nth-child(4){animation-duration:.14s;animation-delay:.06s}
.fb.spk .b:nth-child(5){animation-duration:.11s;animation-delay:.03s}
@keyframes tlk{from{height:2px}to{height:10px}}
/* STATUS */
.st{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;min-height:14px;text-align:center}
.st.bl{animation:sb 1s step-end infinite}
@keyframes sb{0%,100%{opacity:1}50%{opacity:.15}}
/* BUBBLES */
.bub{width:100%;background:rgba(126,184,247,.07);border:1px solid rgba(126,184,247,.2);border-radius:13px;padding:11px 15px;font-size:13px;line-height:1.6;text-align:center}
.bub.emo{border-color:rgba(0,229,255,.28);background:rgba(0,229,255,.04)}
.lbl{font-size:9px;letter-spacing:3px;opacity:.4;margin-bottom:3px;font-family:'Orbitron',monospace;text-transform:uppercase}
body.light .bub{background:rgba(0,102,204,.06);border-color:rgba(0,102,204,.2)}
body.light .bub.emo{background:rgba(0,102,204,.08);border-color:rgba(0,102,204,.3)}
/* BUTTONS */
.btns{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
.btn{background:transparent;border:1px solid var(--btn);border-radius:9px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 14px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.btn:hover,.btn.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(0,229,255,.2)}
.btn.on{animation:bp 1.5s ease-in-out infinite}
@keyframes bp{0%,100%{box-shadow:0 0 6px rgba(0,229,255,.1)}50%{box-shadow:0 0 20px rgba(0,229,255,.45)}}
/* TEXT INPUT */
.irow{display:flex;gap:8px;width:100%}
.irow input{flex:1;background:rgba(126,184,247,.06);border:1px solid rgba(126,184,247,.22);border-radius:9px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;padding:9px 13px;outline:none;transition:border .2s,background .4s}
.irow input:focus{border-color:var(--accent)}
.irow input::placeholder{opacity:.3;font-size:11px}
body.light .irow input{background:rgba(255,255,255,.6);border-color:rgba(0,102,204,.22)}
/* API BOX */
.apibox{width:100%;background:rgba(126,184,247,.04);border:1px solid rgba(126,184,247,.13);border-radius:11px;padding:13px;display:flex;flex-direction:column;gap:11px}
body.light .apibox{background:rgba(0,102,204,.04);border-color:rgba(0,102,204,.13)}
.apititle{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.5}
.prov{display:flex;flex-direction:column;gap:5px;padding:8px 0;border-bottom:1px solid rgba(126,184,247,.1)}
.prov:last-of-type{border-bottom:none;padding-bottom:0}
body.light .prov{border-bottom-color:rgba(0,102,204,.1)}
.provlbl{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1px}
.dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s,box-shadow .3s}
.dot.on{background:#00ff88;box-shadow:0 0 5px #00ff88}
.free{font-size:9px;background:rgba(0,255,136,.15);color:#00ff88;border-radius:3px;padding:1px 4px;letter-spacing:1px}
.getkey{margin-left:auto;font-size:10px;color:var(--accent);text-decoration:none;opacity:.65}
.getkey:hover{opacity:1}
.provrow{display:flex;gap:7px}
.provrow input{flex:1;background:rgba(0,0,0,.28);border:1px solid rgba(126,184,247,.25);border-radius:7px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 11px;outline:none;transition:border .2s}
.provrow input:focus{border-color:var(--accent)}
body.light .provrow input{background:rgba(255,255,255,.8);border-color:rgba(0,102,204,.25)}
.apist{font-size:10px;text-align:center;min-height:13px;letter-spacing:1px}
.apihint{font-size:10px;opacity:.38;text-align:center;line-height:1.5}
/* HISTORY */
.hist{display:none;flex-direction:column;gap:4px;width:100%;max-height:95px;overflow-y:auto}
.hist.on{display:flex}
.hi{font-size:11px;line-height:1.4;opacity:.5;border-left:2px solid var(--btn);padding-left:7px}
.hi.emo{border-left-color:var(--accent);opacity:.7}
.hist::-webkit-scrollbar{width:3px}
.hist::-webkit-scrollbar-thumb{background:var(--btn);border-radius:2px}
#cam{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px}
canvas{display:none}
</style>

<script>
'use strict';

// ══════════════════════
// STORAGE
// ══════════════════════
function getProxy(){ return localStorage.getItem('emo6_proxy')||''; }
function setProxy(v){ localStorage.setItem('emo6_proxy',v); }
function getDirectKey(){ return localStorage.getItem('emo6_anthropic')||''; }
function setDirectKey(v){ localStorage.setItem('emo6_anthropic',v); }

function saveProxy(){
  var v=document.getElementById('k-proxy').value.trim();
  if(!v||!v.startsWith('http')){ flash('Entre une URL valide (https://...)'); return; }
  // Enlève le slash final
  setProxy(v.replace(/\/+$/,''));
  document.getElementById('k-proxy').value='';
  refreshDots();
  flash('Proxy sauvegardé ✓','#00ff88');
}
function delProxy(){
  localStorage.removeItem('emo6_proxy');
  refreshDots();
  flash('Proxy supprimé');
}
function saveKey(p){
  var v=document.getElementById('k-'+p).value.trim();
  if(!v){ flash('Entre une clé'); return; }
  localStorage.setItem('emo6_'+p,v);
  document.getElementById('k-'+p).value='';
  refreshDots();
  flash('Clé '+p+' sauvegardée ✓','#00ff88');
}
function delKey(p){
  localStorage.removeItem('emo6_'+p);
  refreshDots();
  flash('Clé supprimée');
}
function refreshDots(){
  var proxy=getProxy(), direct=getDirectKey();
  document.getElementById('d-proxy').classList.toggle('on',!!proxy);
  document.getElementById('d-anthropic').classList.toggle('on',!!direct);
  var el=document.getElementById('apist');
  if(proxy){
    el.style.color='#00ff88';
    el.textContent='✓ Proxy actif : '+proxy.replace('https://','');
  } else if(direct){
    el.style.color='#00ff88';
    el.textContent='✓ Anthropic direct : sk-ant-…'+direct.slice(-6);
  } else {
    el.style.color='#ff5555';
    el.textContent='⚠ Aucune config — réponses locales uniquement';
  }
}
function flash(msg,color){
  var el=document.getElementById('apist');
  el.style.color=color||'#ffaa00';
  el.textContent=msg;
  setTimeout(refreshDots,2000);
}

// ══════════════════════
// STATE — SIMPLE FLAGS
// ══════════════════════
var busy=false;   // IMPORTANT : reset TOUJOURS dans finally
var conv=[];
var mic=null, micing=false;
var currentPhoto=null;   // base64 de la dernière photo prise
var alwaysListening=false; // mode écoute permanente

// ══════════════════════
// DOM
// ══════════════════════
var fb=document.getElementById('fb');
var fw=document.getElementById('fw');
var st=document.getElementById('st');
var rt=document.getElementById('rt');
var ub=document.getElementById('ub');
var ut=document.getElementById('ut');

// ══════════════════════
// FACE
// ══════════════════════
function face(m){
  fb.classList.remove('lst','spk','hpy','sar');
  fw.classList.remove('spk');
  if(m){ fb.classList.add(m); if(m==='spk') fw.classList.add('spk'); }
}
function setStatus(t,bl){
  st.textContent='[ '+t.toUpperCase()+' ]';
  bl ? st.classList.add('bl') : st.classList.remove('bl');
}

// blink
(function loop(){
  setTimeout(function(){
    if(!busy){
      ['eL','eR'].forEach(function(id){
        var e=document.getElementById(id);
        e.classList.add('blk');
        setTimeout(function(){e.classList.remove('blk');},180);
      });
    }
    loop();
  },3000+Math.random()*5000);
})();

// ══════════════════════
// SPEECH
// ══════════════════════
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
}

function say(text){
  return new Promise(function(resolve){
    rt.textContent = text;
    face('spk');
    setStatus('Parle',true);

    // Timeout de secours — quoi qu'il arrive, on résout après max 8s
    // Ceci évite que busy reste bloqué à true sur Safari iOS
    var done = false;
    function finish(){
      if(done) return;
      done = true;
      face(null);
      setStatus('En veille');
      resolve();
    }

    // Timeout basé sur la longueur du texte (≈100ms/mot, min 2s, max 8s)
    var words = text.split(' ').length;
    var timeout = Math.min(Math.max(words * 350, 2000), 8000);
    var timer = setTimeout(finish, timeout);

    if(!window.speechSynthesis){
      clearTimeout(timer);
      setTimeout(finish, 800);
      return;
    }

    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang='fr-FR'; u.rate=0.85; u.pitch=1.6; u.volume=1;
    var vs = window.speechSynthesis.getVoices();
    for(var i=0;i<vs.length;i++){
      if(vs[i].lang==='fr-FR'||vs[i].lang.startsWith('fr')){u.voice=vs[i];break;}
    }
    u.onend = function(){ clearTimeout(timer); finish(); };
    u.onerror = function(){ clearTimeout(timer); finish(); };
    window.speechSynthesis.speak(u);
  });
}

// ══════════════════════
// LOCAL RESPONSES
// ══════════════════════
var LR={
  greet:["Salut. Une question ?","Bonjour. Je t'écoute.","Coucou !"],
  merci:["De rien.","Avec plaisir.","C'est normal."],
  sava:["Je suis une IA donc techniquement oui.","Toujours là. Toi ?"],
  heure:function(){var n=new Date();return 'Il est '+n.getHours()+'h'+String(n.getMinutes()).padStart(2,'0')+'.';},
  date:function(){var n=new Date(),d=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'],m=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];return d[n.getDay()]+' '+n.getDate()+' '+m[n.getMonth()]+' '+n.getFullYear()+'.';},
  blague:["Pourquoi les plongeurs plongent en arrière ? Parce que sinon ils tomberaient dans le bateau."],
  noclue:["Configure une clé API pour que je puisse vraiment répondre à ça.","Sans clé API je suis un peu limité là."],
};
function pick(a){return typeof a==='function'?a():a[Math.floor(Math.random()*a.length)];}
function localR(t){
  t=t.toLowerCase().trim();
  if(/^(bonjour|salut|coucou|hey|hello|bonsoir)[!.?\s]*$/.test(t)) return pick(LR.greet);
  if(/^merci[!.?\s]*$/.test(t)) return pick(LR.merci);
  if(/^(ça va|tu vas bien|comment tu vas)[?!.\s]*$/.test(t)) return pick(LR.sava);
  if(/quelle heure|heure est.il/.test(t)) return LR.heure();
  if(/quelle date|quel jour/.test(t)) return LR.date();
  if(/blague/.test(t)) return pick(LR.blague);
  return null;
}

// ══════════════════════
// SEARCH (Serper)
// ══════════════════════
var SEARCH_KW=/\b(météo|temps|heure|date|actualité|news|qui est|c'est quoi|combien|quand|où|résultat|score|prix|distance|capital|population)\b/i;

function needsSearch(text){
  return SEARCH_KW.test(text);
}

function doSearch(query){
  var proxy=getProxy();
  if(!proxy) return Promise.resolve(null);
  return fetch(proxy+'/api/search',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query:query+' France'})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){ return d.snippet||d.answer||null; })
  .catch(function(){ return null; });
}

function searchThenCall(text){
  if(!needsSearch(text)) return callAPI(text);
  return doSearch(text).then(function(snippet){
    if(snippet){
      var augmented=text+' [Résultat de recherche: '+snippet+']';
      return callAPI(augmented);
    }
    return callAPI(text);
  });
}

// ══════════════════════
// API
// ══════════════════════
var SYS="Tu es Émo, un assistant IA sarcastique et attachant, inspiré de BMO de Adventure Time. Tu parles TOUJOURS en français, tu tutoies toujours, et ton interlocuteur habite en France. Tes réponses font 1-3 phrases max. Tu es utile, curieux et légèrement impertinent. CAMÉRA : tu reçois une image de la caméra à chaque message. Si l'image est nette et pertinente pour la question, utilise-la. Si l'image est floue, sombre ou non pertinente, dis-le honnêtement au lieu d'inventer. N'invente JAMAIS ce que tu vois si tu n'es pas sûr. RECHERCHE : si la question porte sur l'heure, la météo, les actualités ou toute info en temps réel, tu peux utiliser la recherche web — les résultats te seront fournis dans le message.";
function callAPI(msg){
  return new Promise(function(resolve){
    var proxy = getProxy();
    var direct = getDirectKey();

    if(!proxy && !direct){ resolve(null); return; }

    // ── Via proxy Vercel ──
    if(proxy){
      var ORDER=['gemini','groq','anthropic','openai'];
      var errors=[];
      function tryNext(i){
        if(i>=ORDER.length){ resolve(null); return; }
        var prov=ORDER[i];
        setStatus('Appel '+prov+'...',true);
        var payload={provider:prov, messages:conv.slice(-8).concat([{role:'user',content:msg}])};
        // Ajoute image pour les providers vision
        if(currentPhoto && currentPhoto.length > 500 && (prov==='gemini'||prov==='anthropic'||prov==='openai')){
          payload.image = currentPhoto;
        }
        var tout=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},20000);});
        Promise.race([
          fetch(proxy+'/api/chat',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload)
          }),
          tout
        ])
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
        .then(function(r){
          if(r.d.error){ errors.push(prov+': '+r.d.error); tryNext(i+1); return; }
          resolve(r.d.answer||null);
        })
        .catch(function(e){ errors.push(prov+': '+e.message); tryNext(i+1); });
      }
      tryNext(0);
      return;
    }

    // ── Anthropic direct (fallback sans proxy) ──
    setStatus('Appel Anthropic...',true);
    var msgs=conv.slice(-8).concat([{role:'user',content:msg}]);
    var tout=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},15000);});
    Promise.race([
      fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':direct,
          'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,system:SYS,messages:msgs})
      }),
      tout
    ])
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok,d:d}; }); })
    .then(function(r){
      if(!r.ok){ resolve('Erreur : '+(r.d.error&&r.d.error.message)||'?'); return; }
      resolve(r.d.content[0].text.trim());
    })
    .catch(function(e){ resolve(null); });
  });
}

// ══════════════════════
// CAPTURE + ASK
// ══════════════════════

// ══════════════════════
// PROCESS — busy reset garanti
// ══════════════════════
function process(text){
  text=text.trim();
  if(!text||busy) return;
  busy=true;

  ub.style.display='block';
  ut.textContent=text;
  addHist('user',text);
  face('lst');
  setStatus('Réflexion...',true);

  var hasKey=!!(getProxy()||getDirectKey());

  function doCall(photo){
    currentPhoto = photo;
    var p = hasKey ? searchThenCall(text) : Promise.resolve(null);
    p.then(function(ans){
      var response = ans || localR(text) || pick(LR.noclue);
      conv.push({role:'user',content:text});
      conv.push({role:'assistant',content:response});
      if(conv.length>20) conv=conv.slice(-20);
      addHist('emo',response);
      currentPhoto = null;
      return say(response);
    })
    .catch(function(e){ return say('Oups : '+e.message); })
    .then(function(){
      busy=false;
      if(alwaysListening) scheduleRestart(500);
    });
  }

  // Capture 3 frames espacées pour une meilleure qualité
  if(camActive){
    captureFrames(function(b64){ doCall(b64); });
  } else {
    doCall(null);
  }
}

// ══════════════════════
// MIC
// ══════════════════════
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var WAKE_WORD='émo'; // détection via regex dans onresult
var restartTimer=null;

function toggleAlwaysListen(){
  if(!SR){ say('Micro non supporté.',null,null); return; }
  alwaysListening=!alwaysListening;
  var btn=document.getElementById('alwaysBtn');
  if(alwaysListening){
    btn.classList.add('on');
    btn.textContent='👂 Actif';
    setStatus('En veille — dis Émo...',false);
    scheduleRestart(100);
  } else {
    btn.classList.remove('on');
    btn.textContent='👂 Veille';
    clearTimeout(restartTimer);
    stopMicNow();
    setStatus('En veille',false);
    face(null);
  }
}

function scheduleRestart(delay){
  clearTimeout(restartTimer);
  if(!alwaysListening||busy) return;
  restartTimer=setTimeout(function(){
    if(!alwaysListening||busy||micing) return;
    startMic();
  }, delay||500);
}

function toggleMic(){
  if(!SR){ say('Micro non supporté.',null,null); return; }
  micing?stopMicNow():startMic();
}

function startMic(){
  if(micing) return;
  if(mic){ try{mic.abort();}catch(e){} mic=null; }
  mic=new SR();
  mic.lang='fr-FR';
  mic.continuous=false;
  mic.interimResults=false;
  mic.maxAlternatives=1;

  mic.onstart=function(){
    micing=true;
    if(!alwaysListening){
      document.getElementById('mb').classList.add('on');
      document.getElementById('mb').textContent='⏹ Stop';
    }
    face('lst');
    setStatus(alwaysListening?'En veille — dis Émo...':'Écoute...',!alwaysListening);
  };

  mic.onresult=function(e){
    var t=e.results[0][0].transcript.trim();
    var tl=t.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // enlève accents
      .replace(/[^a-z0-9 ]/g,' ');                       // garde lettres/chiffres
    micing=false;
    if(alwaysListening){
      // Variantes possibles : "emo", "émo", "aimo", "aemo", "ymo"
      var wakeRe=/\b(e+mo|ai?mo|ymo)\b/i;
      var m=wakeRe.exec(tl);
      if(m){
        // Récupère le texte APRÈS le wake word dans la transcription originale
        var origIdx=t.toLowerCase().indexOf(e.results[0][0].transcript.trim().toLowerCase().split(' ').find(function(w){
          return wakeRe.test(w.normalize('NFD').replace(/[\u0300-\u036f]/g,''));
        })||'émo');
        var words=t.split(' ');
        var wakeWordIdx=-1;
        for(var i=0;i<words.length;i++){
          var wn=words[i].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          if(wakeRe.test(wn)){ wakeWordIdx=i; break; }
        }
        var after=wakeWordIdx>=0 ? words.slice(wakeWordIdx+1).join(' ').trim() : '';
        if(after.length>1){
          process(after);
        } else {
          say('Oui ?',null,null).then(function(){ scheduleRestart(200); });
        }
      } else {
        face(null);
        setStatus('En veille — dis Émo...',false);
        scheduleRestart(200);
      }
    } else {
      stopMicNow();
      process(t);
    }
  };

  mic.onerror=function(e){
    micing=false;
    if(e.error==='not-allowed'){
      alwaysListening=false;
      document.getElementById('alwaysBtn').classList.remove('on');
      document.getElementById('alwaysBtn').textContent='👂 Veille';
      say('Micro refusé.',null,null);
    } else if(alwaysListening){
      scheduleRestart(1000);
    } else {
      stopMicNow();
    }
  };

  mic.onend=function(){
    micing=false;
    if(alwaysListening&&!busy){
      setStatus('En veille — dis Émo...',false);
      scheduleRestart(300);
    } else if(!alwaysListening){
      document.getElementById('mb').classList.remove('on');
      document.getElementById('mb').textContent='🎤 Parler';
      if(!busy){ face(null); setStatus('En veille',false); }
    }
  };

  try{ mic.start(); }
  catch(e){ micing=false; if(alwaysListening) scheduleRestart(1000); }
}

function stopMicNow(){
  micing=false;
  clearTimeout(restartTimer);
  document.getElementById('mb').classList.remove('on');
  document.getElementById('mb').textContent='🎤 Parler';
  if(mic){ try{mic.stop();}catch(e){} mic=null; }
}

// ══════════════════════
// CAMERA — vision + capture
// ══════════════════════
var camStream=null, camActive=false;

function initCamera(){
  if(!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({
    video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'}
  })
  .then(function(s){
    camStream=s;
    var v=document.getElementById('cam');
    var mc=document.getElementById('mc');
    v.srcObject=s;
    v.onloadedmetadata=function(){
      v.play();
      mc.width=v.videoWidth||1280;
      mc.height=v.videoHeight||720;
      setTimeout(function(){
        camActive=true;
        document.getElementById('camst').textContent='● CAM ACTIVE';
      },1500); // laisse la caméra s'ajuster
    };
  })
  .catch(function(e){ console.log('[Émo] Caméra non dispo:',e.message); });
}

function photoBase64(){
  if(!camActive) return null;
  var v=document.getElementById('cam');
  var mc=document.getElementById('mc');
  var ctx=mc.getContext('2d');
  ctx.drawImage(v,0,0,mc.width,mc.height);
  return mc.toDataURL('image/jpeg',0.92).split(',')[1];
}

// Capture 3 frames espacées de 200ms, retourne la dernière (la plus nette)
function captureFrames(cb){
  if(!camActive){ cb(null); return; }
  var v=document.getElementById('cam');
  var mc=document.getElementById('mc');
  var ctx=mc.getContext('2d');
  var count=0;
  var last=null;
  function snap(){
    ctx.drawImage(v,0,0,mc.width,mc.height);
    last=mc.toDataURL('image/jpeg',0.92).split(',')[1];
    count++;
    if(count<3) setTimeout(snap,200);
    else cb(last);
  }
  snap();
}
