<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Émo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
:root{--bg:#0a0a0a;--text:#c8e6ff;--accent:#00e5ff;--blue:#7eb8f7;--btn:rgba(126,184,247,0.3)}
body.light{--bg:#ddeeff;--text:#0a2a4a;--accent:#0066cc;--btn:rgba(0,102,204,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .4s,color .4s}
.wrap{display:flex;flex-direction:column;align-items:center;gap:13px;padding:20px;width:100%;max-width:400px}
.title{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:6px;color:var(--accent);text-transform:uppercase}
.fw{width:190px;height:190px;cursor:pointer;filter:drop-shadow(0 0 22px rgba(126,184,247,.45));transition:filter .3s}
.fw.spk{animation:fg .4s ease-in-out infinite alternate}
@keyframes fg{from{filter:drop-shadow(0 0 22px rgba(126,184,247,.45))}to{filter:drop-shadow(0 0 55px var(--accent))}}
.fb{width:100%;height:100%;background:var(--blue);border-radius:28px;position:relative;overflow:hidden}
.fb::before{content:'';position:absolute;top:-40%;left:-20%;width:50%;height:60%;background:rgba(255,255,255,.12);border-radius:50%;transform:rotate(-30deg)}
.eyes{position:absolute;top:29%;left:0;right:0;display:flex;justify-content:center;gap:36px}
.eye{width:34px;height:34px;background:#111;border-radius:6px;position:relative;overflow:hidden;transition:height .1s}
.eye::after{content:'';position:absolute;inset:5px;background:radial-gradient(circle,#00e5ff 0%,#006080 70%,transparent 100%);border-radius:3px;opacity:0;transition:opacity .3s}
.fb.lst .eye::after{opacity:1;animation:eg 1s ease-in-out infinite alternate}
@keyframes eg{from{opacity:.5}to{opacity:1}}
.fb.hpy .eye{height:22px;border-radius:6px 6px 14px 14px}
@keyframes blk{0%,100%{height:34px}50%{height:3px;border-radius:2px}}
.eye.blk{animation:blk .15s ease-in-out}
.mth{position:absolute;bottom:23%;left:50%;transform:translateX(-50%);width:64px;height:16px;background:#111;border-radius:4px;overflow:hidden;transition:all .2s}
.fb.hpy .mth{height:9px;border-radius:0 0 32px 32px}
.mi{width:100%;height:100%;display:flex;align-items:flex-end;justify-content:space-around;padding:0 3px 2px;gap:2px}
.b{flex:1;background:var(--accent);border-radius:2px 2px 0 0;height:0}
.fw.spk .b{animation:tlk .12s ease-in-out infinite alternate}
.fw.spk .b:nth-child(1){animation-duration:.13s}
.fw.spk .b:nth-child(2){animation-duration:.10s;animation-delay:.04s}
.fw.spk .b:nth-child(3){animation-duration:.09s;animation-delay:.01s}
.fw.spk .b:nth-child(4){animation-duration:.14s;animation-delay:.06s}
.fw.spk .b:nth-child(5){animation-duration:.11s;animation-delay:.03s}
@keyframes tlk{from{height:2px}to{height:10px}}
.st{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;min-height:14px;text-align:center}
.st.bl{animation:sb 1s step-end infinite}
@keyframes sb{0%,100%{opacity:1}50%{opacity:.15}}
.info{font-size:9px;letter-spacing:2px;opacity:.35;text-align:center;min-height:12px}
.bub{width:100%;background:rgba(126,184,247,.07);border:1px solid rgba(126,184,247,.2);border-radius:13px;padding:11px 15px;font-size:13px;line-height:1.6;text-align:center}
.bub.emo{border-color:rgba(0,229,255,.28);background:rgba(0,229,255,.04)}
.lbl{font-size:9px;letter-spacing:3px;opacity:.4;margin-bottom:3px;font-family:'Orbitron',monospace;text-transform:uppercase}
body.light .bub{background:rgba(0,102,204,.06);border-color:rgba(0,102,204,.2)}
body.light .bub.emo{background:rgba(0,102,204,.08);border-color:rgba(0,102,204,.3)}
.btns{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
.btn{background:transparent;border:1px solid var(--btn);border-radius:9px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 14px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.btn:hover,.btn.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(0,229,255,.2)}
.btn.on{animation:bp 1.5s ease-in-out infinite}
@keyframes bp{0%,100%{box-shadow:0 0 6px rgba(0,229,255,.1)}50%{box-shadow:0 0 20px rgba(0,229,255,.45)}}
.irow{display:flex;gap:8px;width:100%}
.irow input{flex:1;background:rgba(126,184,247,.06);border:1px solid rgba(126,184,247,.22);border-radius:9px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;padding:9px 13px;outline:none;transition:border .2s}
.irow input:focus{border-color:var(--accent)}
.irow input::placeholder{opacity:.3;font-size:11px}
body.light .irow input{background:rgba(255,255,255,.6);border-color:rgba(0,102,204,.22)}
.apibox{width:100%;background:rgba(126,184,247,.04);border:1px solid rgba(126,184,247,.13);border-radius:11px;padding:13px;display:flex;flex-direction:column;gap:10px}
.apititle{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.5}
.prov{display:flex;flex-direction:column;gap:5px;padding:7px 0;border-bottom:1px solid rgba(126,184,247,.1)}
.prov:last-of-type{border-bottom:none;padding-bottom:0}
.provlbl{display:flex;align-items:center;gap:7px;font-size:11px}
.dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s}
.dot.on{background:#00ff88;box-shadow:0 0 5px #00ff88}
.getkey{margin-left:auto;font-size:10px;color:var(--accent);text-decoration:none;opacity:.65}
.provrow{display:flex;gap:7px}
.provrow input{flex:1;background:rgba(0,0,0,.28);border:1px solid rgba(126,184,247,.25);border-radius:7px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 11px;outline:none;transition:border .2s}
.provrow input:focus{border-color:var(--accent)}
body.light .provrow input{background:rgba(255,255,255,.8)}
.apist{font-size:10px;text-align:center;min-height:13px}
.hist{display:none;flex-direction:column;gap:4px;width:100%;max-height:90px;overflow-y:auto}
.hist.on{display:flex}
.hi{font-size:11px;line-height:1.4;opacity:.5;border-left:2px solid var(--btn);padding-left:7px}
.hi.emo{border-left-color:var(--accent);opacity:.7}
#cam{position:fixed;top:-9999px;left:-9999px}
#mc{display:none}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="mc"></canvas>

<div class="wrap">
  <div class="title">◈ ÉMO ◈</div>

  <div class="fw" id="fw">
    <div class="fb" id="fb">
      <div class="eyes">
        <div class="eye" id="eL"></div>
        <div class="eye" id="eR"></div>
      </div>
      <div class="mth"><div class="mi">
        <div class="b"></div><div class="b"></div><div class="b"></div>
        <div class="b"></div><div class="b"></div>
      </div></div>
    </div>
  </div>

  <div class="st" id="st">[ EN VEILLE ]</div>
  <div class="info" id="info"></div>

  <div class="bub emo">
    <div class="lbl">Émo dit</div>
    <div id="rt">Écris ta question ou appuie sur 🎤</div>
  </div>

  <div class="bub" id="ub" style="display:none">
    <div class="lbl">Toi</div>
    <div id="ut"></div>
  </div>

  <div class="btns">
    <button class="btn" id="mbtn" onclick="toggleMic()">🎤 Parler</button>
    <button class="btn" id="abtn" onclick="toggleAlways()">👂 Veille</button>
    <button class="btn" id="tbtn" onclick="toggleTheme()">🌙</button>
    <button class="btn" onclick="document.getElementById('hist').classList.toggle('on')">📜</button>
  </div>

  <div class="irow">
    <input type="text" id="ti" placeholder="Écris ta question…" onkeydown="if(event.key==='Enter')send()">
    <button class="btn" onclick="send()">→</button>
  </div>

  <div class="hist" id="hist"></div>

  <div class="apibox">
    <div class="apititle">Configuration</div>
    <div class="prov">
      <div class="provlbl"><span class="dot" id="dp"></span>Proxy Vercel<a class="getkey" href="https://vercel.com" target="_blank">vercel.com →</a></div>
      <div class="provrow">
        <input type="text" id="kp" placeholder="https://mon-proxy.vercel.app">
        <button class="btn" onclick="saveProxy()">💾</button>
        <button class="btn" onclick="delProxy()">🗑</button>
      </div>
    </div>
    <div class="prov">
      <div class="provlbl"><span class="dot" id="da"></span>Anthropic direct<a class="getkey" href="https://console.anthropic.com" target="_blank">Obtenir →</a></div>
      <div class="provrow">
        <input type="password" id="ka" placeholder="sk-ant-...">
        <button class="btn" onclick="saveAnthropic()">💾</button>
        <button class="btn" onclick="delAnthropic()">🗑</button>
      </div>
    </div>
    <div class="apist" id="apist"></div>
  </div>
</div>

<script>
// ── STORAGE ──
function gProxy(){ return localStorage.getItem('emo_proxy') || ''; }
function gAnthr(){ return localStorage.getItem('emo_anthr') || ''; }

function saveProxy(){
  var v = document.getElementById('kp').value.trim();
  if(!v){ setApist('URL invalide','#f55'); return; }
  localStorage.setItem('emo_proxy', v.replace(/\/+$/, ''));
  document.getElementById('kp').value = '';
  refreshDots(); setApist('Proxy sauvegardé ✓','#0f8');
}
function delProxy(){
  localStorage.removeItem('emo_proxy');
  refreshDots(); setApist('Proxy supprimé','#fa0');
}
function saveAnthropic(){
  var v = document.getElementById('ka').value.trim();
  if(!v){ setApist('Clé vide','#f55'); return; }
  localStorage.setItem('emo_anthr', v);
  document.getElementById('ka').value = '';
  refreshDots(); setApist('Clé Anthropic sauvegardée ✓','#0f8');
}
function delAnthropic(){
  localStorage.removeItem('emo_anthr');
  refreshDots(); setApist('Clé supprimée','#fa0');
}
function setApist(msg, color){
  var el = document.getElementById('apist');
  el.style.color = color || '#fa0';
  el.textContent = msg;
  setTimeout(refreshDots, 2000);
}
function refreshDots(){
  var p = gProxy(), a = gAnthr();
  document.getElementById('dp').classList.toggle('on', !!p);
  document.getElementById('da').classList.toggle('on', !!a);
  var el = document.getElementById('apist');
  if(p){ el.style.color='#0f8'; el.textContent='✓ Proxy : ' + p.replace('https://',''); }
  else if(a){ el.style.color='#0f8'; el.textContent='✓ Anthropic direct'; }
  else { el.style.color='#f55'; el.textContent='⚠ Aucune config'; }
}

// ── STATE ──
var busy = false;
var conv = [];
var currentPhotos = [];
var camActive = false;
var micObj = null;
var micing = false;
var always = false;
var restartT = null;

// ── DOM ──
var fb = document.getElementById('fb');
var fw = document.getElementById('fw');

// ── FACE ──
function face(m){
  fb.className = 'fb' + (m ? ' ' + m : '');
  fw.className = 'fw' + (m === 'spk' ? ' spk' : '');
}
function setSt(t, bl){
  var el = document.getElementById('st');
  el.textContent = '[ ' + t.toUpperCase() + ' ]';
  el.className = 'st' + (bl ? ' bl' : '');
}
function setInfo(t){ document.getElementById('info').textContent = t; }

// blink loop
(function bloop(){
  setTimeout(function(){
    if(!busy){
      ['eL','eR'].forEach(function(id){
        var e = document.getElementById(id);
        e.classList.add('blk');
        setTimeout(function(){ e.classList.remove('blk'); }, 180);
      });
    }
    bloop();
  }, 3000 + Math.random()*5000);
})();

// ── SPEECH ──
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function(){ window.speechSynthesis.getVoices(); };
}

function say(text){
  document.getElementById('rt').textContent = text;
  face('spk'); setSt('Parle', true);
  return new Promise(function(resolve){
    var done = false;
    function finish(){
      if(done) return; done = true;
      face(null); setSt('En veille', false);
      resolve();
    }
    var ms = Math.min(Math.max(text.split(' ').length * 380, 2000), 10000);
    var timer = setTimeout(finish, ms);
    if(!window.speechSynthesis){ clearTimeout(timer); setTimeout(finish, 600); return; }
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; u.rate = 0.85; u.pitch = 1.6; u.volume = 1;
    var vs = window.speechSynthesis.getVoices();
    for(var i = 0; i < vs.length; i++){
      if(vs[i].lang === 'fr-FR' || vs[i].lang.startsWith('fr')){
        u.voice = vs[i]; break;
      }
    }
    u.onend = function(){ clearTimeout(timer); finish(); };
    u.onerror = function(){ clearTimeout(timer); finish(); };
    window.speechSynthesis.speak(u);
  });
}

// ── LOCAL FALLBACK ──
function localR(t){
  t = t.toLowerCase();
  if(/^(bonjour|salut|coucou|hey|bonsoir)[!.? ]*$/.test(t)) return 'Salut ! Qu\'est-ce que je peux faire pour toi ?';
  if(/^merci[!.? ]*$/.test(t)) return 'De rien !';
  if(/^(ça va|tu vas bien)[?!. ]*$/.test(t)) return 'Je suis une IA donc techniquement oui. Toi ?';
  if(/blague/.test(t)) return 'Pourquoi les plongeurs plongent en arrière ? Parce que sinon ils tomberaient dans le bateau.';
  if(/heure est.il|quelle heure/.test(t)){
    var n = new Date(); return 'Il est ' + n.getHours() + 'h' + String(n.getMinutes()).padStart(2,'0') + '.';
  }
  if(/quel jour|quelle date/.test(t)){
    var n2 = new Date();
    var d = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    var m = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return d[n2.getDay()] + ' ' + n2.getDate() + ' ' + m[n2.getMonth()] + ' ' + n2.getFullYear() + '.';
  }
  return null;
}

// ── CAMERA ──
function initCam(){
  if(!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'}})
    .then(function(s){
      var v = document.getElementById('cam');
      var c = document.getElementById('mc');
      v.srcObject = s;
      v.onloadedmetadata = function(){
        v.play();
        c.width = v.videoWidth || 1280;
        c.height = v.videoHeight || 720;
        setTimeout(function(){
          camActive = true;
          setInfo('● CAM');
        }, 2000);
      };
    })
    .catch(function(){});
}

function snapFrame(){
  if(!camActive) return null;
  var v = document.getElementById('cam');
  var c = document.getElementById('mc');
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  return c.toDataURL('image/jpeg', 0.92).split(',')[1];
}

function captureFrames(cb){
  if(!camActive){ cb([]); return; }
  var out = [], i = 0;
  function next(){
    var f = snapFrame(); if(f) out.push(f);
    if(++i < 4) setTimeout(next, 200); else cb(out);
  }
  next();
}

// ── API ──
var SYS = "Tu es Émo, un assistant IA sarcastique et attachant, inspiré de BMO. Tu parles TOUJOURS en français, tu tutoies toujours. Tes réponses font 1-3 phrases max. Tu es utile et légèrement impertinent. L'utilisateur habite en France. Tu as accès à une caméra : tu reçois des images de ce que la caméra voit. Si les images sont inutilisables, dis-le honnêtement. Quand des résultats web te sont fournis dans ton contexte, utilise-les pour répondre. Cherche sur internet UNIQUEMENT ce que tu ne peux pas savoir toi-même (météo, actualités, événements récents, prix en temps réel). Pour tout le reste réponds directement.";

function callProxy(msg, photos){
  return new Promise(function(resolve){
    var proxy = gProxy();
    if(!proxy){ resolve(null); return; }
    var payload = {
      provider: 'gemini',
      messages: conv.slice(-8).concat([{role:'user', content:msg}]),
      images: photos.slice(0, 4)
    };
    var tout = new Promise(function(_, rej){ setTimeout(function(){ rej(new Error('timeout')); }, 20000); });
    var ORDER = ['gemini','groq','anthropic','openai'];
    var i = 0;
    function tryNext(){
      if(i >= ORDER.length){ resolve(null); return; }
      payload.provider = ORDER[i++];
      setSt('Appel ' + payload.provider + '...', true);
      Promise.race([
        fetch(proxy + '/api/chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        }),
        tout
      ])
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.error){ tryNext(); return; }
        resolve(d.answer || null);
      })
      .catch(function(){ tryNext(); });
    }
    tryNext();
  });
}

function callDirect(msg){
  return new Promise(function(resolve){
    var key = gAnthr();
    if(!key){ resolve(null); return; }
    setSt('Appel Anthropic...', true);
    var msgs = conv.slice(-8).concat([{role:'user', content:msg}]);
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:250, system:SYS, messages:msgs})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.content) resolve(d.content[0].text.trim());
      else resolve('Erreur : ' + (d.error ? d.error.message : '?'));
    })
    .catch(function(){ resolve(null); });
  });
}

// ── PROCESS ──
function process(text){
  text = text.trim();
  if(!text || busy) return;
  busy = true;
  document.getElementById('ub').style.display = 'block';
  document.getElementById('ut').textContent = text;
  addHist('user', text);
  face('lst'); setSt('Réflexion...', true);

  captureFrames(function(photos){
    currentPhotos = photos;
    var hasConfig = !!(gProxy() || gAnthr());

    // Essaie d'abord local
    var local = localR(text);
    if(local && !hasConfig){
      finish(local); return;
    }

    // Appel API
    var p = gProxy() ? callProxy(text, photos) : callDirect(text);
    p.then(function(ans){
      finish(ans || local || 'Configure une clé API pour que je puisse vraiment t\'aider !');
    }).catch(function(e){
      finish(local || 'Oups : ' + e.message);
    });
  });
}

function finish(response){
  conv.push({role:'user', content:document.getElementById('ut').textContent});
  conv.push({role:'assistant', content:response});
  if(conv.length > 20) conv = conv.slice(-20);
  addHist('emo', response);
  say(response).then(function(){
    busy = false;
    if(always) schedRestart(500);
  });
}

// ── TEXT ──
function send(){
  var el = document.getElementById('ti');
  var t = el.value.trim();
  el.value = '';
  if(t) process(t);
}

// ── MIC ──
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var WAKES = ['émo','emo','hémo','aimo','aïmo','émot','émau','ymo','imo'];

function toggleAlways(){
  if(!SR){ say('Micro non supporté.'); return; }
  always = !always;
  var btn = document.getElementById('abtn');
  if(always){
    btn.classList.add('on'); btn.textContent = '👂 Actif';
    setSt('Dis Émo...', false);
    schedRestart(200);
  } else {
    btn.classList.remove('on'); btn.textContent = '👂 Veille';
    clearTimeout(restartT);
    stopMic();
    if(!busy){ face(null); setSt('En veille', false); }
  }
}

function schedRestart(delay){
  clearTimeout(restartT);
  if(!always || busy) return;
  restartT = setTimeout(function(){
    if(!always || busy || micing) return;
    startMic();
  }, delay || 600);
}

function toggleMic(){
  if(!SR){ say('Micro non supporté.'); return; }
  if(micing) stopMic(); else startMic();
}

function startMic(){
  if(micing) return;
  if(micObj){ try{ micObj.abort(); }catch(e){} micObj = null; }
  micObj = new SR();
  micObj.lang = 'fr-FR';
  micObj.continuous = false;
  micObj.interimResults = false;

  micObj.onstart = function(){
    micing = true;
    if(!always){
      document.getElementById('mbtn').classList.add('on');
      document.getElementById('mbtn').textContent = '⏹ Stop';
    }
    face('lst');
    setSt(always ? 'Dis Émo...' : 'Écoute...', !always);
  };

  micObj.onresult = function(e){
    var t = e.results[0][0].transcript.trim();
    var tl = t.toLowerCase();
    micing = false;

    if(always){
      // Cherche le wake word
      var found = -1, wlen = 0;
      for(var i = 0; i < WAKES.length; i++){
        var idx = tl.indexOf(WAKES[i]);
        if(idx !== -1){ found = idx; wlen = WAKES[i].length; break; }
      }
      if(found !== -1){
        var after = t.slice(found + wlen).replace(/^[^a-zA-ZÀ-ÿ0-9]+/, '').trim();
        if(after.length > 1){
          process(after);
        } else {
          say('Oui ?').then(function(){ schedRestart(300); });
        }
      } else {
        face(null);
        setSt('Dis Émo...', false);
        schedRestart(300);
      }
    } else {
      stopMic();
      process(t);
    }
  };

  micObj.onerror = function(e){
    micing = false;
    if(e.error === 'not-allowed'){
      always = false;
      document.getElementById('abtn').classList.remove('on');
      document.getElementById('abtn').textContent = '👂 Veille';
      say('Micro refusé. Vérifie les permissions.');
    } else if(always){
      schedRestart(1000);
    } else {
      stopMic();
    }
  };

  micObj.onend = function(){
    micing = false;
    if(always && !busy){
      setSt('Dis Émo...', false);
      schedRestart(400);
    } else if(!always){
      document.getElementById('mbtn').classList.remove('on');
      document.getElementById('mbtn').textContent = '🎤 Parler';
      if(!busy){ face(null); setSt('En veille', false); }
    }
  };

  try{ micObj.start(); }
  catch(e){ micing = false; if(always) schedRestart(1000); }
}

function stopMic(){
  micing = false;
  document.getElementById('mbtn').classList.remove('on');
  document.getElementById('mbtn').textContent = '🎤 Parler';
  if(micObj){ try{ micObj.stop(); }catch(e){} micObj = null; }
}

// ── HISTORY ──
function addHist(role, text){
  var d = document.createElement('div');
  d.className = 'hi ' + role;
  d.textContent = (role === 'emo' ? '◈ Émo : ' : '➤ Toi : ') + text;
  var h = document.getElementById('hist');
  h.appendChild(d); h.scrollTop = h.scrollHeight;
}

// ── THEME ──
function toggleTheme(){
  var l = document.body.classList.toggle('light');
  localStorage.setItem('emo_theme', l ? 'light' : 'dark');
  document.getElementById('tbtn').textContent = l ? '☀️' : '🌙';
}

// ── FACE CLICK ──
document.getElementById('fw').addEventListener('click', function(){
  if(!busy){
    var r = ["Tu m'as tapé dessus.", "Oui je suis là.", "Arrête de me toucher."];
    process(r[Math.floor(Math.random()*r.length)]);
  }
});

// ── INIT ──
(function(){
  if(localStorage.getItem('emo_theme') === 'light'){
    document.body.classList.add('light');
    document.getElementById('tbtn').textContent = '☀️';
  }
  refreshDots();
  initCam();
  setTimeout(function(){
    var hasConfig = !!(gProxy() || gAnthr());
    process(hasConfig ? "Clé API chargée. Je suis prêt !" : "Bonjour ! Configure une clé API ou pose-moi une question simple.");
  }, 800);
})();
</script>
